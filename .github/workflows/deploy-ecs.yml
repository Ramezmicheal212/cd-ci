name: Deploy Spring Boot to ECS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hotel-booking-app
  ECS_SERVICE: hotel-task-service-tqtpvfq1
  ECS_CLUSTER: hotels-booking-cluster1
  ECS_TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: hotel-app-container

jobs:
  deploy:
    name: Test, build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run unit tests
        run: mvn test

      - name: Build application jar
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
          LATEST_URI="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest"

          docker build -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test ALB health endpoint
        env:
          ALB_URL: ${{ vars.ALB_URL }}
        run: |
          if [ -z "$ALB_URL" ]; then
            echo "Set repository variable ALB_URL to your deployed Application Load Balancer base URL."
            exit 1
          fi

          HEALTH_URL="${ALB_URL%/}/actuator/health"
          echo "Checking $HEALTH_URL"

          RESPONSE="$(curl --silent --show-error --fail --max-time 30 "$HEALTH_URL")"
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"UP"'
